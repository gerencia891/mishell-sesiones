<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishell Fontalvo — Gestión de Sesiones</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#FDFAF5;color:#222;min-height:100vh}
:root{--brand:#B8732A;--bl:#F5ECD9;--bd:#8A5218}
.header{background:#fff;border-bottom:1px solid var(--bl);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{color:var(--brand);font-size:19px;font-style:italic}
.sub{color:var(--bd);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.layout{display:flex}
.sidebar{width:210px;background:#fff;border-right:1px solid var(--bl);min-height:calc(100vh - 56px);padding:18px 0;flex-shrink:0}
.nav-lbl{padding:0 22px 10px;font-size:10px;color:#bbb;letter-spacing:2px;text-transform:uppercase}
.nav-item{padding:10px 22px;cursor:pointer;font-size:14px;color:#555;border-left:3px solid transparent;display:flex;align-items:center;gap:10px;transition:all .15s}
.nav-item.active{color:var(--brand);background:var(--bl);border-left-color:var(--brand);font-weight:600}
.main{flex:1;padding:28px;overflow-y:auto}
.card{background:#fff;border:1px solid var(--bl);border-radius:12px;padding:16px 20px;margin-bottom:12px}
.btn{border:none;border-radius:8px;padding:7px 15px;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;font-family:Georgia,serif;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--brand);color:#fff}
.btn-outline{background:transparent;color:var(--brand);border:1.5px solid var(--brand)}
.btn-danger{background:#dc3545;color:#fff}
.btn-green{background:#28a745;color:#fff}
.btn-sm{padding:4px 12px;font-size:12px}
input,textarea,select{font-family:Georgia,serif;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;width:100%;margin-bottom:10px}
textarea{resize:vertical;min-height:120px}
.lbl{font-size:12px;color:#777;margin-bottom:4px;display:block}
.badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:#fff;border:1px solid var(--bl);border-radius:12px;padding:14px 16px;text-align:center}
.sem-grid{display:flex;gap:10px;margin-bottom:22px}
.sem-card{flex:1;border-radius:10px;padding:12px 14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 10px;color:var(--bd);font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--bl)}
td{padding:8px 10px;border-bottom:1px solid var(--bl)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:28px;width:780px;max-width:96vw;max-height:92vh;overflow-y:auto}
.toast{position:fixed;top:16px;right:16px;z-index:999;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:500;color:#fff}
.sem-opt{flex:1;padding:9px 8px;border-radius:10px;background:#f8f8f8;border:2px solid #ddd;cursor:pointer;text-align:center}
.search-wrap{position:relative;width:260px}
.search-wrap input{margin-bottom:0}
.search-drop{position:absolute;top:110%;right:0;width:300px;background:#fff;border:1px solid var(--bl);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:50;display:none}
.search-drop.show{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bl);font-size:13px}
.sr-item:hover{background:var(--bl)}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:#999;flex-wrap:wrap}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border:1px solid var(--bl);border-radius:16px;padding:40px;width:380px;text-align:center}
.chip{font-size:11px;color:var(--bd);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.empty{color:#ccc;text-align:center;padding:28px 0;font-size:14px}
.saving{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;border-radius:10px;padding:7px 18px;font-size:12px;z-index:998}
.fmt-bar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.fmt-btn{background:#F5ECD9;color:var(--brand);border:1px solid var(--bl);border-radius:6px;padding:4px 11px;cursor:pointer;font-size:12px;font-family:Georgia,serif;font-weight:600}
.fmt-btn:hover{background:var(--bl)}
.sess-collapsed{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:all .2s}
.sess-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.sess-header:hover{background:#f8fafc}
.sess-body{display:none;border-top:1px solid #e2e8f0}
.sess-body.open{display:block}
</style>
</head>
<body>

<div id="loading" style="text-align:center;padding:60px;color:#aaa;font-family:Georgia,serif">⏳ Cargando...</div>

<div id="login-screen" style="display:none" class="login-wrap">
  <div class="login-box">
    <div style="color:var(--brand);font-size:28px;font-style:italic;margin-bottom:4px">Mishell Fontalvo</div>
    <div style="color:var(--bd);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px">PSICÓLOGA</div>
    <label class="lbl" style="text-align:left">Correo electrónico</label>
    <input id="l-email" type="email" placeholder="tu@correo.com">
    <label class="lbl" style="text-align:left">Contraseña</label>
    <input id="l-pass" type="password" placeholder="••••••••">
    <div id="l-err" style="color:#dc3545;font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar</button>
    <div style="margin-top:14px;font-size:12px;color:#aaa">¿Primera vez? <span style="color:var(--brand);cursor:pointer" onclick="doRegister()">Crear cuenta</span></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="logo">Mishell Fontalvo</div>
      <div class="sub">Psicóloga · Gestión de Sesiones</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="search-wrap">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa">🔍</span>
        <input style="padding-left:34px" id="g-search" placeholder="Buscar empresa o persona…" oninput="doSearch(this.value)">
        <div class="search-drop" id="s-drop"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="auth.signOut()">Salir</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="nav-lbl">Módulos</div>
      <div class="nav-item" id="n-home" onclick="go('home')">🏠 Inicio</div>
      <div class="nav-item" id="n-consultoria" onclick="go('cat','consultoria')">💼 Consultoría</div>
      <div class="nav-item" id="n-reuniones" onclick="go('cat','reuniones')">🤝 Reuniones</div>
      <div class="nav-item" id="n-terapia" onclick="go('cat','terapia')">🧠 Terapia</div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

<div id="modal-wrap" class="overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-box"></div>
</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="saving" class="saving" style="display:none">💾 Guardando...</div>

<script>
const FB={apiKey:"AIzaSyALCwXNrwJuc-jY_1FPPvewtyY113jf4e8",authDomain:"mishell360-dc7dd.firebaseapp.com",projectId:"mishell360-dc7dd",storageBucket:"mishell360-dc7dd.firebasestorage.app",messagingSenderId:"867252715678",appId:"1:867252715678:web:8d10855a6820466d673b8f"};
firebase.initializeApp(FB);
const db=firebase.firestore(),auth=firebase.auth();
const CL={consultoria:"Consultoría",reuniones:"Reuniones",terapia:"Terapia"};
const CI={consultoria:"💼",reuniones:"🤝",terapia:"🧠"};
let NAV={view:"home",cat:null,eid:null,pid:null};
let currentUser=null,_sem="verde",_pun=0;

function si(v){
  if(v==="verde") return{bg:"#d4edda",color:"#155724",dot:"#28a745",label:"Avance"};
  if(v==="amarillo") return{bg:"#fff3cd",color:"#856404",dot:"#ffc107",label:"En progreso"};
  return{bg:"#f8d7da",color:"#721c24",dot:"#dc3545",label:"Crítico"};
}
function badge(v){const s=si(v);return`<span class="badge" style="background:${s.bg};color:${s.color}"><span class="dot" style="background:${s.dot}"></span>${s.label}</span>`;}
function toast(msg,type="ok"){const t=document.getElementById("toast");t.textContent=msg;t.style.background=type==="danger"?"#dc3545":"#B8732A";t.style.display="block";setTimeout(()=>t.style.display="none",2800);}
function showModal(h){document.getElementById("modal-box").innerHTML=h;document.getElementById("modal-wrap").style.display="flex";}
function closeModal(){document.getElementById("modal-wrap").style.display="none";}
function saving(v){document.getElementById("saving").style.display=v?"block":"none";}

function renderText(text){
  if(!text)return"";
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong style='color:#1e293b;font-weight:900'>$1</strong>")
    .replace(/_(.*?)_/g,"<em style='color:#1e40af;font-style:italic'>$1</em>")
    .replace(/\[c\](.*?)\[\/c\]/g,"<div style='text-align:center;font-weight:700;color:#1e293b;margin:6px 0'>$1</div>")
    .replace(/^(→|•|✓) (.+)$/gm,'<div style="display:flex;gap:10px;margin:5px 0;align-items:flex-start"><span style="color:#B8732A;font-weight:700;flex-shrink:0">$1</span><span>$2</span></div>')
    .replace(/\n/g,"<br>");
}

function fmt(id,type){
  const ta=document.getElementById(id);if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);
  if(!sel){toast("Selecciona texto primero","danger");return;}
  let w=type==="bold"?"**"+sel+"**":type==="italic"?"_"+sel+"_":"[c]"+sel+"[/c]";
  ta.value=ta.value.substring(0,s)+w+ta.value.substring(e);
  const st=ta.scrollTop;ta.focus();ta.setSelectionRange(s+w.length,s+w.length);
  requestAnimationFrame(()=>ta.scrollTop=st);
}
function fmtLine(id,prefix){
  const ta=document.getElementById(id);if(!ta)return;
  const st=ta.scrollTop,pos=ta.selectionStart;
  const before=ta.value.substring(0,pos),after=ta.value.substring(pos);
  const ins=(before.length>0&&!before.endsWith("\n")?"\n":"")+prefix;
  ta.value=before+ins+after;
  ta.focus();ta.setSelectionRange(pos+ins.length,pos+ins.length);
  requestAnimationFrame(()=>ta.scrollTop=st);
}

function toggleSess(id){
  const body=document.getElementById("body-"+id);
  const arrow=document.getElementById("arrow-"+id);
  if(!body)return;
  const open=body.classList.contains("open");
  body.classList.toggle("open",!open);
  if(arrow)arrow.style.transform=open?"":"rotate(180deg)";
}

auth.onAuthStateChanged(u=>{
  document.getElementById("loading").style.display="none";
  if(u){currentUser=u;document.getElementById("login-screen").style.display="none";document.getElementById("app").style.display="block";render();}
  else{document.getElementById("login-screen").style.display="flex";document.getElementById("app").style.display="none";}
});

function doLogin(){
  const e=document.getElementById("l-email").value,p=document.getElementById("l-pass").value,err=document.getElementById("l-err");
  err.style.display="none";
  auth.signInWithEmailAndPassword(e,p).catch(()=>{err.textContent="Correo o contraseña incorrectos";err.style.display="block";});
}
function doRegister(){
  const e=document.getElementById("l-email").value,p=document.getElementById("l-pass").value,err=document.getElementById("l-err");
  if(!e||!p){err.textContent="Ingresa correo y contraseña";err.style.display="block";return;}
  auth.createUserWithEmailAndPassword(e,p).catch(er=>{err.textContent=er.message;err.style.display="block";});
}

const uid=()=>currentUser.uid;
const eRef=(c)=>db.collection("u/"+uid()+"/"+c);
const pRef=(c,ei)=>db.collection("u/"+uid()+"/"+c+"/"+ei+"/p");
const sRef=(c,ei,pi)=>db.collection("u/"+uid()+"/"+c+"/"+ei+"/p/"+pi+"/s");

function go(view,cat,eid,pid){
  NAV={view,cat:cat||null,eid:eid||null,pid:pid||null};
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  const el=document.getElementById("n-"+(cat||"home"));if(el)el.classList.add("active");
  render();
}

async function render(){
  const m=document.getElementById("main");
  m.innerHTML='<div style="text-align:center;padding:40px;color:#aaa">⏳ Cargando...</div>';
  const {view,cat,eid,pid}=NAV;
  if(view==="home") await renderHome(m);
  else if(view==="cat") await renderCat(m,cat);
  else if(view==="empresa") await renderEmpresa(m,cat,eid);
  else if(view==="person") await renderPerson(m,cat,eid,pid);
}

async function getAllSess(cat){
  const all=[];
  const emps=(await eRef(cat).get()).docs;
  for(const e of emps){
    const ps=(await pRef(cat,e.id).get()).docs;
    for(const p of ps){
      const ss=(await sRef(cat,e.id,p.id).orderBy("date","desc").get()).docs;
      ss.forEach(s=>all.push({...s.data(),id:s.id,en:e.data().name,pn:p.data().name,ei:e.id,pi:p.id,cat}));
    }
  }
  return all.sort((a,b)=>b.date.localeCompare(a.date));
}

function semHtml(sess){
  const c={verde:0,amarillo:0,rojo:0};
  sess.forEach(s=>c[s.semaforo]=(c[s.semaforo]||0)+1);
  return`<div class="sem-grid">${["verde","amarillo","rojo"].map(v=>{const s=si(v);const p=sess.length?Math.round((c[v]||0)/sess.length*100):0;return`<div class="sem-card" style="background:${s.bg}"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="dot" style="background:${s.dot}"></span><span style="font-size:11px;font-weight:600;color:${s.color}">${s.label}</span></div><div style="font-size:24px;font-weight:700;color:${s.color}">${c[v]||0}</div><div style="margin-top:6px;height:4px;background:rgba(0,0,0,.08);border-radius:4px"><div style="width:${p}%;height:100%;background:${s.dot};border-radius:4px"></div></div></div>`;}).join("")}</div>`;
}

function tblHtml(sess,showCat,showEmp,showPerson){
  if(!sess.length)return'<div class="empty">Sin sesiones registradas aún.</div>';
  return`<div style="overflow-x:auto"><table><thead><tr><th>Fecha</th>${showEmp?"<th>Empresa</th>":""}${showPerson?"<th>Persona</th>":""}${showCat?"<th>Categoría</th>":""}<th>Avance</th><th>Informe</th></tr></thead><tbody>${sess.slice(0,15).map(s=>{const pd=JSON.stringify(s).replace(/'/g,"&#39;");return`<tr><td>${s.date}</td>${showEmp?`<td style="font-weight:600">${s.en}</td>`:""}${showPerson?`<td>${s.pn}</td>`:""}${showCat?`<td>${CI[s.cat]} ${CL[s.cat]}</td>`:""}<td>${badge(s.semaforo)}</td><td>${s.notes?`<button class="btn btn-green btn-sm" onclick='doPrint(${pd})'>🖨️ Descargar</button>`:'<span style="color:#ccc;font-size:12px">Sin notas</span>'}</td></tr>`;}).join("")}</tbody></table></div>`;
}

async function renderHome(m){
  let all=[];
  for(const c of["consultoria","reuniones","terapia"])all=[...all,...(await getAllSess(c))];
  const totE=await Promise.all(["consultoria","reuniones","terapia"].map(c=>eRef(c).get().then(r=>r.size)));
  const totP=await Promise.all(["consultoria","reuniones","terapia"].map(c=>eRef(c).get().then(async r=>{let n=0;for(const e of r.docs)n+=(await pRef(c,e.id).get()).size;return n;})));
  m.innerHTML=`
    <div style="margin-bottom:22px"><div style="color:var(--brand);font-size:24px;font-style:italic">Bienvenida, Mishell</div><div style="color:#999;font-size:13px;margin-top:2px">Resumen general de tu práctica profesional</div></div>
    <div class="stat-grid">${[{l:"Empresas",v:totE.reduce((a,b)=>a+b,0),i:"📁"},{l:"Personas",v:totP.reduce((a,b)=>a+b,0),i:"👥"},{l:"Sesiones",v:all.length,i:"📋"},{l:"Con informe",v:all.filter(s=>s.notes).length,i:"✨"}].map(x=>`<div class="stat-card"><div style="font-size:22px">${x.i}</div><div style="font-size:26px;font-weight:700;color:var(--brand)">${x.v}</div><div style="font-size:11px;color:#999">${x.l}</div></div>`).join("")}</div>
    ${semHtml(all)}
    <div class="card"><div class="chip">Sesiones recientes</div>${tblHtml(all,true,true,true)}</div>`;
}

async function renderCat(m,cat){
  const all=await getAllSess(cat);
  const emps=(await eRef(cat).get()).docs;
  m.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h2 style="color:var(--brand);font-size:19px;margin:0">${CI[cat]} ${CL[cat]}</h2><button class="btn btn-primary" onclick="openEmpModal('${cat}')">+ Nueva carpeta</button></div>
    ${semHtml(all)}
    <div class="card" style="margin-bottom:22px"><div class="chip">Sesiones de ${CL[cat]}</div>${tblHtml(all,false,true,true)}</div>
    <div class="chip">Carpetas</div>
    <input placeholder="🔍 Buscar carpeta…" oninput="filterList(this.value,'ec')" style="margin-top:8px">
    <div id="emp-list">${emps.length===0?'<div class="empty">Sin carpetas. ¡Crea la primera!</div>':emps.map(e=>{const n=e.data().name.replace(/'/g,"\\'");return`<div class="card ec" data-n="${e.data().name.toLowerCase()}" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="go('empresa','${cat}','${e.id}')"><div><div style="font-weight:600;font-size:15px">📁 ${e.data().name}</div></div><div style="display:flex;gap:8px" onclick="event.stopPropagation()"><button class="btn btn-outline btn-sm" onclick="openEmpModal('${cat}','${e.id}','${n}')">✏️</button><button class="btn btn-danger btn-sm" onclick="delEmp('${cat}','${e.id}')">🗑️</button></div></div>`;}).join("")}</div>`;
}

async function renderEmpresa(m,cat,eid){
  const eDoc=await eRef(cat).doc(eid).get();
  const en=eDoc.data().name;
  const ps=(await pRef(cat,eid).get()).docs;
  const all=[];
  for(const p of ps){const ss=(await sRef(cat,eid,p.id).orderBy("date","desc").get()).docs;ss.forEach(s=>all.push({...s.data(),id:s.id,en,pn:p.data().name,ei:eid,pi:p.id,cat}));}
  all.sort((a,b)=>b.date.localeCompare(a.date));
  m.innerHTML=`
    <div class="breadcrumb"><button class="btn btn-outline btn-sm" onclick="go('cat','${cat}')">← Volver</button><span>${CL[cat]}</span>/<span>📁 ${en}</span></div>
    ${semHtml(all)}
    <div class="card" style="margin-bottom:22px"><div class="chip">Sesiones de ${en}</div>${tblHtml(all,false,false,true)}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="chip" style="margin:0">Personas</div><button class="btn btn-primary btn-sm" onclick="openPersonModal('${cat}','${eid}')">+ Nueva persona</button></div>
    <input placeholder="🔍 Buscar persona…" oninput="filterList(this.value,'pc')">
    <div id="p-list">${ps.length===0?'<div class="empty">Sin personas. ¡Agrega la primera!</div>':ps.map(p=>{const n=p.data().name.replace(/'/g,"\\'");return`<div class="card pc" data-n="${p.data().name.toLowerCase()}" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="go('person','${cat}','${eid}','${p.id}')"><div><div style="font-weight:600;font-size:14px">👤 ${p.data().name}</div><div style="font-size:12px;color:var(--brand);margin-top:2px">${p.data().sessCount||0} sesión(es)</div></div><div style="display:flex;gap:8px" onclick="event.stopPropagation()"><button class="btn btn-outline btn-sm" onclick="openPersonModal('${cat}','${eid}','${p.id}','${n}')">✏️</button><button class="btn btn-danger btn-sm" onclick="delPerson('${cat}','${eid}','${p.id}')">🗑️</button></div></div>`;}).join("")}</div>`;
}

async function renderPerson(m,cat,eid,pid){
  const eDoc=await eRef(cat).doc(eid).get();
  const pDoc=await pRef(cat,eid).doc(pid).get();
  const en=eDoc.data().name,pn=pDoc.data().name;
  const ss=(await sRef(cat,eid,pid).orderBy("date","desc").get()).docs;
  m.innerHTML=`
    <div class="breadcrumb"><button class="btn btn-outline btn-sm" onclick="go('empresa','${cat}','${eid}')">← Volver</button><span>${CL[cat]}</span>/<span>📁 ${en}</span>/<span>👤 ${pn}</span></div>

            </div>
            <div style="padding:12px 16px;border-right:1px solid #e2e8f0;text-align:center">

              <div style="background:#e2e8f0;border-radius:99px;height:8px;margin-top:6px"><div style="width:${pct}%;height:100%;border-radius:99px;background:linear-gradient(90deg,#1e40af,#3b82f6)"></div></div>

              <span style="width:28px;height:28px;background:linear-gradient(135deg,#C8832A,#D4943A);border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:14px">💡</span> Observaciones y próximos pasos
            </div>

          <div style="padding:12px 24px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px">
            <button class="btn btn-green btn-sm" onclick='doPrint(${pd})'>🖨️ Descargar informe</button>
            <button class="btn btn-outline btn-sm" onclick="openSessModal('${cat}','${eid}','${pid}','${s.id}','${encodeURIComponent(sd.date)}','${encodeURIComponent(sd.notes||"")}','${sd.semaforo||"verde"}','${encodeURIComponent(sd.report||"")}','${sd.puntuacion||0}')">✏️ Editar</button>
            <button class="btn btn-danger btn-sm" onclick="delSess('${cat}','${eid}','${pid}','${s.id}')">🗑️</button>
          </div>
        </div>
      </div>`;}).join("")}</div>`;
}

function filterList(q,cls){document.querySelectorAll("."+cls).forEach(el=>{el.style.display=el.dataset.n&&el.dataset.n.includes(q.toLowerCase())?"flex":"none";});}

function openEmpModal(cat,id,name){

    <div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEmp('${cat}','${id||""}')">Guardar</button></div>`);
}
async function saveEmp(cat,id){
  const name=document.getElementById("m-name").value.trim();if(!name)return;
  saving(true);
  if(id)await eRef(cat).doc(id).update({name});
  else await eRef(cat).add({name,createdAt:new Date()});

}

}

function selPun(n){
  _pun=n;
  [1,2,3,4,5].forEach(i=>{const el=document.getElementById("star-"+i);if(el)el.style.color=i<=n?"#B8732A":"#ddd";});
}
function selSem(v){
  _sem=v;
  ["verde","amarillo","rojo"].forEach(x=>{
    const el=document.getElementById("so-"+x);if(!el)return;
    const s=si(x);
    if(x===v){el.style.background=s.bg;el.style.borderColor=s.dot;}
    else{el.style.background="#f8f8f8";el.style.borderColor="#ddd";}
  });
}

  showModal(`<h3 style="color:var(--brand);margin-bottom:16px">${id?"Editar":"Nueva"} sesión</h3>
    <label class="lbl">Fecha *</label>
    <input id="m-date" type="date" value="${d}">

    </div>
    <textarea id="m-notes" style="min-height:220px" placeholder="Escribe aquí todo lo trabajado en la sesión…">${n}</textarea>
    <label class="lbl">Observaciones y próximos pasos</label>
    <div class="fmt-bar">
      <button type="button" class="fmt-btn" onmousedown="event.preventDefault();fmt('m-obs','bold')"><b>N</b> Negrilla</button>
      <button type="button" class="fmt-btn" onmousedown="event.preventDefault();fmt('m-obs','italic')"><i>K</i> Cursiva</button>
      <button type="button" class="fmt-btn" onmousedown="event.preventDefault();fmt('m-obs','center')">⬛ Centrar</button>
      <button type="button" class="fmt-btn" onmousedown="event.preventDefault();fmtLine('m-obs','• ')">• Lista</button>
      <button type="button" class="fmt-btn" onmousedown="event.preventDefault();fmtLine('m-obs','→ ')">→ Punto clave</button>
      <button type="button" class="fmt-btn" onmousedown="event.preventDefault();fmtLine('m-obs','✓ ')">✓ Logro</button>
    </div>
    <textarea id="m-obs" style="min-height:140px" placeholder="Compromisos, recomendaciones, próximos pasos…">${o}</textarea>
    <label class="lbl">Puntuación de avance</label>
    <div style="display:flex;gap:12px;margin-bottom:16px">
      ${[1,2,3,4,5].map(n=>`<div onclick="selPun(${n})" id="star-${n}" style="font-size:36px;cursor:pointer;color:${n<=_pun?"#B8732A":"#ddd"};user-select:none;transition:color .15s">★</div>`).join("")}
    </div>
    <label class="lbl">Semáforo de avance</label>
    <div style="display:flex;gap:10px;margin-bottom:18px">
      ${["verde","amarillo","rojo"].map(v=>{const s=si(v);return`<div class="sem-opt" id="so-${v}" style="${v===_sem?"background:"+s.bg+";border-color:"+s.dot:""}" onclick="selSem('${v}')"><div style="width:14px;height:14px;border-radius:50%;background:${s.dot};margin:0 auto 4px"></div><div style="font-size:12px;font-weight:600;color:${s.color}">${s.label}</div></div>`;}).join("")}
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSess('${cat}','${eid}','${pid}','${id||""}')">Guardar sesión</button>
    </div>`);
}

async function saveSess(cat,eid,pid,id){
  const date=document.getElementById("m-date").value;
  const notes=document.getElementById("m-notes").value.trim();
  const obs=document.getElementById("m-obs").value.trim();
  if(!date||!notes)return;
  saving(true);
  if(id)await sRef(cat,eid,pid).doc(id).update({date,notes,semaforo:_sem,report:obs,puntuacion:_pun});
  else await sRef(cat,eid,pid).add({date,notes,semaforo:_sem,report:obs,puntuacion:_pun,createdAt:new Date()});
  saving(false);closeModal();toast(id?"Sesión actualizada":"Sesión registrada");render();
}
async function delSess(cat,eid,pid,id){
  if(!confirm("¿Eliminar esta sesión?"))return;
  await sRef(cat,eid,pid).doc(id).delete();toast("Eliminado","danger");render();
}

function doPrint(s){
  const inf=si(s.semaforo||"verde");
  const score=s.puntuacion||0;
  const stars="★".repeat(score)+"☆".repeat(5-score);
  const pct=score*20;
  const semColor=inf.bg==="#d4edda"?"#10B981":inf.bg==="#fff3cd"?"#F59E0B":"#EF4444";
  const semBg=inf.bg==="#d4edda"?"#10B98120":inf.bg==="#fff3cd"?"#F59E0B20":"#EF444420";
  const semIcon=inf.bg==="#d4edda"?"✅":inf.bg==="#fff3cd"?"⚡":"🔴";
  function rt(text){
    if(!text)return"";
    return text
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\*\*(.*?)\*\*/g,"<strong style='color:#1e293b;font-weight:900;font-size:13px'>$1</strong>")
      .replace(/_(.*?)_/g,"<em style='color:#1e40af;font-style:italic;font-size:13px'>$1</em>")
      .replace(/\[c\](.*?)\[\/c\]/g,"<div style='text-align:center;font-weight:700;font-size:13px;color:#1e293b;margin:8px 0'>$1</div>")
      .replace(/^(→) (.+)$/gm,'<div style="display:flex;gap:10px;margin:5px 0;align-items:flex-start;font-size:13px"><span style="color:#1e40af;font-weight:700;flex-shrink:0;font-size:13px">→</span><span style="color:#334155;font-size:13px">$2</span></div>')
      .replace(/^(•) (.+)$/gm,'<div style="display:flex;gap:10px;margin:5px 0;align-items:flex-start;font-size:13px"><span style="color:#C8832A;font-weight:700;flex-shrink:0;font-size:13px">•</span><span style="color:#334155;font-size:13px">$2</span></div>')
      .replace(/^(✓) (.+)$/gm,'<div style="display:flex;gap:10px;margin:5px 0;align-items:flex-start;font-size:13px"><span style="color:#10B981;font-weight:700;flex-shrink:0;font-size:13px">✓</span><span style="color:#334155;font-size:13px">$2</span></div>')
      .replace(/\n\n/g,'<div style="height:8px"></div>')
      .replace(/\n/g,"<br>");
  }
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Informe - ${s.pn||""}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f1f5f9;min-height:100vh;padding:32px 20px;color:#1e293b;font-size:13px;line-height:1.5}
    .page{max-width:800px;margin:0 auto}
    .hdr{background:linear-gradient(135deg,#1e293b,#1e40af);color:#fff;border-radius:16px;padding:32px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-style:italic;font-family:Georgia,serif;font-size:22px;color:#C8832A}
    .brand-sub{font-size:9px;letter-spacing:5px;color:#C8832A;text-transform:uppercase;margin-top:2px}
    .div-line{width:50px;height:2px;background:#C8832A;margin:18px 0 12px}
    .rtype{color:#93c5fd;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
    .pname{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px}
    .msub{color:#94a3b8;font-size:12px}
    .sem-box{text-align:center;background:${semBg};border:2px solid ${semColor};border-radius:16px;padding:20px 28px;min-width:130px}
    .sem-icon{font-size:36px;margin-bottom:8px}
    .sem-lbl{font-size:15px;font-weight:700;color:${semColor}}
    .sem-sub{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .ci{border-radius:12px;padding:18px;text-align:center;color:#fff}
    .ci.date{background:#1e40af}
    .ci.score{background:#7c3aed}
    .ci.emp{background:#0f766e}
    .cv{font-size:17px;font-weight:900;margin-bottom:4px}
    .cl{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.8}
    .stars{font-size:22px;letter-spacing:3px;margin-bottom:4px;color:#fbbf24}
    .sec{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:22px 26px;margin-bottom:16px}
    .sh{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #f1f5f9}
    .si-box{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .st{font-size:12px;font-weight:900;color:#1e40af;letter-spacing:2px;text-transform:uppercase}
    .pr{margin-bottom:14px}
    .pt{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
    .pt span:first-child{color:#475569;font-weight:600}
    .pt span:last-child{color:#1e40af;font-weight:700}
    .pb{background:#f1f5f9;border-radius:99px;height:12px;overflow:hidden}
    .pf{height:100%;border-radius:99px;background:linear-gradient(90deg,#1e40af,#3b82f6)}
    .nb{background:#eff6ff;border-left:4px solid #1e40af;border-radius:0 10px 10px 0;padding:18px 22px;font-size:13px;color:#334155;line-height:1.9;font-family:Arial,sans-serif}
    .nb *{font-size:13px!important;font-family:Arial,sans-serif!important}
    .ob{font-size:13px;color:#475569;line-height:1.9;font-family:Arial,sans-serif}
    .ob *{font-size:13px!important;font-family:Arial,sans-serif!important}
    .ft{background:linear-gradient(135deg,#1e293b,#1e40af);border-radius:12px;padding:20px;text-align:center;margin-top:8px}
    .fb{font-style:italic;font-family:Georgia,serif;font-size:18px;color:#C8832A;margin-bottom:4px}
    .fs{color:rgba(255,255,255,.45);font-size:10px;letter-spacing:3px;text-transform:uppercase}
    @media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}
  </style></head><body>
  <div class="page">
    <div class="hdr">
      <div>
        <div class="brand">Mishell Fontalvo</div>
        <div class="brand-sub">Psicóloga</div>
        <div class="div-line"></div>
        <div class="rtype">Informe de Sesión</div>
        <div class="pname">${s.pn||""}</div>
        <div class="msub">${s.en||""} · ${s.date}</div>
      </div>
      <div class="sem-box">
        <div class="sem-icon">${semIcon}</div>
        <div class="sem-lbl">${inf.label}</div>
        <div class="sem-sub">Estado de sesión</div>
      </div>
    </div>
    <div class="cards">
      <div class="ci date"><div class="cv">${s.date}</div><div class="cl">Fecha de sesión</div></div>
      <div class="ci score"><div class="stars">${stars}</div><div class="cl">Puntuación ${score}/5</div></div>
      <div class="ci emp"><div class="cv" style="font-size:14px">${s.en||"—"}</div><div class="cl">Empresa / Org.</div></div>
    </div>
    <div class="sec">
      <div class="sh"><div class="si-box">📊</div><div class="st">Indicadores de Avance</div></div>
      <div class="pr"><div class="pt"><span>Avance general</span><span>${pct}%</span></div><div class="pb"><div class="pf" style="width:${pct}%"></div></div></div>
      <div class="pr"><div class="pt"><span>Estado emocional</span><span style="color:${semColor}">${inf.label}</span></div><div class="pb"><div class="pf" style="width:${inf.bg==="#d4edda"?"100":inf.bg==="#fff3cd"?"60":"30"}%;background:${semColor}"></div></div></div>
      <div class="pr" style="margin-bottom:0"><div class="pt"><span>Compromiso observado</span><span>${score>=4?"Alto":score>=3?"Medio":"En desarrollo"}</span></div><div class="pb"><div class="pf" style="width:${score>=4?"90":score>=3?"60":"35"}%"></div></div></div>
    </div>
    <div class="sec">
      <div class="sh"><div class="si-box">📝</div><div class="st">Notas de la Sesión</div></div>
      <div class="nb">${rt(s.notes)}</div>
    </div>
    ${s.report?`<div class="sec"><div class="sh"><div class="si-box" style="background:linear-gradient(135deg,#C8832A,#D4943A)">💡</div><div class="st" style="color:#C8832A">Observaciones y Próximos Pasos</div></div><div class="ob">${rt(s.report)}</div></div>`:""}
    <div class="ft"><div class="fb">Mishell Fontalvo</div><div class="fs">Psicóloga · Sistema de gestión de sesiones</div></div>
  </div></body></html>`;
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="Informe-"+(s.pn||"sesion").replace(/\s+/g,"-")+"-"+s.date+".html";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Informe descargado ✨");
}

async function doSearch(q){
  const drop=document.getElementById("s-drop");
  if(q.trim().length<2){drop.classList.remove("show");return;}
  const items=[];
  for(const cat of["consultoria","reuniones","terapia"]){
    const emps=(await eRef(cat).get()).docs;
    for(const e of emps){
      if(e.data().name.toLowerCase().includes(q.toLowerCase()))items.push({type:"e",cat,eid:e.id,label:e.data().name,sub:CL[cat]});
      const ps=(await pRef(cat,e.id).get()).docs;
      for(const p of ps)if(p.data().name.toLowerCase().includes(q.toLowerCase()))items.push({type:"p",cat,eid:e.id,pid:p.id,label:p.data().name,sub:e.data().name+" · "+CL[cat]});
    }
  }
  if(!items.length){drop.classList.remove("show");return;}
  drop.innerHTML=items.map((r,i)=>`<div class="sr-item" onclick="selSearch(${i})"><div style="font-weight:600">${r.type==="e"?"📁":"👤"} ${r.label}</div><div style="font-size:11px;color:#999">${r.sub}</div></div>`).join("");
  window._si=items;drop.classList.add("show");
}
function selSearch(i){
  const r=window._si[i];
  document.getElementById("g-search").value="";
  document.getElementById("s-drop").classList.remove("show");
  if(r.type==="e")go("empresa",r.cat,r.eid);
  else go("person",r.cat,r.eid,r.pid);
}
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))document.getElementById("s-drop").classList.remove("show");});
</script>
</body>
</html>
