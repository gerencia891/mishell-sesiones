<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishell Fontalvo — Gestión de Sesiones</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#FDFAF5;color:#222;min-height:100vh}
:root{--brand:#B8732A;--bl:#F5ECD9;--bd:#8A5218}
.header{background:#fff;border-bottom:1px solid var(--bl);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{color:var(--brand);font-size:19px;font-style:italic}
.sub{color:var(--bd);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.layout{display:flex}
.sidebar{width:210px;background:#fff;border-right:1px solid var(--bl);min-height:calc(100vh - 56px);padding:18px 0;flex-shrink:0}
.nav-lbl{padding:0 22px 10px;font-size:10px;color:#bbb;letter-spacing:2px;text-transform:uppercase}
.nav-item{padding:10px 22px;cursor:pointer;font-size:14px;color:#555;border-left:3px solid transparent;display:flex;align-items:center;gap:10px;transition:all .15s}
.nav-item.active{color:var(--brand);background:var(--bl);border-left-color:var(--brand);font-weight:600}
.main{flex:1;padding:28px;overflow-y:auto}
.card{background:#fff;border:1px solid var(--bl);border-radius:12px;padding:16px 20px;margin-bottom:12px}
.btn{border:none;border-radius:8px;padding:7px 15px;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;font-family:Georgia,serif}
.btn-primary{background:var(--brand);color:#fff}
.btn-outline{background:transparent;color:var(--brand);border:1.5px solid var(--brand)}
.btn-danger{background:#dc3545;color:#fff}
.btn-green{background:#28a745;color:#fff}
.btn-sm{padding:4px 12px;font-size:12px}
input,textarea,select{font-family:Georgia,serif;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;width:100%;margin-bottom:10px}
textarea{resize:vertical;min-height:120px}
.lbl{font-size:12px;color:#777;margin-bottom:4px;display:block}
.badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:#fff;border:1px solid var(--bl);border-radius:12px;padding:14px 16px;text-align:center}
.sem-grid{display:flex;gap:10px;margin-bottom:22px}
.sem-card{flex:1;border-radius:10px;padding:12px 14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 10px;color:var(--bd);font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--bl)}
td{padding:8px 10px;border-bottom:1px solid var(--bl)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:26px;width:480px;max-width:95vw;max-height:88vh;overflow-y:auto}
.toast{position:fixed;top:16px;right:16px;z-index:999;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:500;color:#fff}
.sem-opt{flex:1;padding:9px 8px;border-radius:10px;background:#f8f8f8;border:2px solid #ddd;cursor:pointer;text-align:center}
.search-wrap{position:relative;width:260px}
.search-wrap input{margin-bottom:0}
.search-drop{position:absolute;top:110%;right:0;width:300px;background:#fff;border:1px solid var(--bl);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:50;display:none}
.search-drop.show{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bl);font-size:13px}
.sr-item:hover{background:var(--bl)}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:#999}
.sess-notes{background:#fafaf8;border-left:3px solid var(--bl);padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;color:#444;white-space:pre-wrap;margin:8px 0}
.sess-report{background:#fff9f4;border:1px solid var(--bl);border-radius:10px;padding:14px 18px;font-size:13px;color:#333;white-space:pre-wrap;line-height:1.9;margin-top:10px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border:1px solid var(--bl);border-radius:16px;padding:40px;width:380px;text-align:center}
.chip{font-size:11px;color:var(--bd);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.empty{color:#ccc;text-align:center;padding:28px 0;font-size:14px}
.saving{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;border-radius:10px;padding:7px 18px;font-size:12px;z-index:998}
</style>
</head>
<body>

<div id="loading" style="text-align:center;padding:60px;color:#aaa;font-family:Georgia,serif">⏳ Cargando...</div>

<div id="login-screen" style="display:none" class="login-wrap">
  <div class="login-box">
    <div style="color:var(--brand);font-size:28px;font-style:italic;margin-bottom:4px">Mishell Fontalvo</div>
    <div style="color:var(--bd);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px">PSICÓLOGA</div>
    <label class="lbl" style="text-align:left">Correo electrónico</label>
    <input id="l-email" type="email" placeholder="tu@correo.com">
    <label class="lbl" style="text-align:left">Contraseña</label>
    <input id="l-pass" type="password" placeholder="••••••••">
    <div id="l-err" style="color:#dc3545;font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar</button>
    <div style="margin-top:14px;font-size:12px;color:#aaa">¿Primera vez? <span style="color:var(--brand);cursor:pointer" onclick="doRegister()">Crear cuenta</span></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="logo">Mishell Fontalvo</div>
      <div class="sub">Psicóloga · Gestión de Sesiones</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="search-wrap">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa">🔍</span>
        <input style="padding-left:34px" id="g-search" placeholder="Buscar empresa o persona…" oninput="doSearch(this.value)">
        <div class="search-drop" id="s-drop"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="auth.signOut()">Salir</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="nav-lbl">Módulos</div>
      <div class="nav-item" id="n-home" onclick="go('home')">🏠 Inicio</div>
      <div class="nav-item" id="n-consultoria" onclick="go('cat','consultoria')">💼 Consultoría</div>
      <div class="nav-item" id="n-reuniones" onclick="go('cat','reuniones')">🤝 Reuniones</div>
      <div class="nav-item" id="n-terapia" onclick="go('cat','terapia')">🧠 Terapia</div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

<div id="modal-wrap" class="overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-box"></div>
</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="saving" class="saving" style="display:none">💾 Guardando...</div>

<script>
const FB = {
  apiKey:"AIzaSyALCwXNrwJuc-jY_1FPPvewtyY113jf4e8",
  authDomain:"mishell360-dc7dd.firebaseapp.com",
  projectId:"mishell360-dc7dd",
  storageBucket:"mishell360-dc7dd.firebasestorage.app",
  messagingSenderId:"867252715678",
  appId:"1:867252715678:web:8d10855a6820466d673b8f"
};
const GEMINI_KEY = "AIzaSyDWdynCcOZBW57YellWK7Q5DjYdk6NPS1o";
firebase.initializeApp(FB);
const db = firebase.firestore();
const auth = firebase.auth();

const CL={consultoria:"Consultoría",reuniones:"Reuniones",terapia:"Terapia"};
const CI={consultoria:"💼",reuniones:"🤝",terapia:"🧠"};
let NAV={view:"home",cat:null,eid:null,pid:null};
let currentUser=null;

function si(v){
  if(v==="verde") return{bg:"#d4edda",color:"#155724",dot:"#28a745",label:"Avance"};
  if(v==="amarillo") return{bg:"#fff3cd",color:"#856404",dot:"#ffc107",label:"En progreso"};
  return{bg:"#f8d7da",color:"#721c24",dot:"#dc3545",label:"Crítico"};
}
function badge(v){const s=si(v);return`<span class="badge" style="background:${s.bg};color:${s.color}"><span class="dot" style="background:${s.dot}"></span>${s.label}</span>`;}
function toast(msg,type="ok"){const t=document.getElementById("toast");t.textContent=msg;t.style.background=type==="danger"?"#dc3545":"#B8732A";t.style.display="block";setTimeout(()=>t.style.display="none",2800);}
function showModal(h){document.getElementById("modal-box").innerHTML=h;document.getElementById("modal-wrap").style.display="flex";}
function closeModal(){document.getElementById("modal-wrap").style.display="none";}
function saving(v){document.getElementById("saving").style.display=v?"block":"none";}

auth.onAuthStateChanged(u=>{
  document.getElementById("loading").style.display="none";
  if(u){currentUser=u;document.getElementById("login-screen").style.display="none";document.getElementById("app").style.display="block";render();}
  else{document.getElementById("login-screen").style.display="flex";document.getElementById("app").style.display="none";}
});

function doLogin(){
  const e=document.getElementById("l-email").value,p=document.getElementById("l-pass").value,err=document.getElementById("l-err");
  err.style.display="none";
  auth.signInWithEmailAndPassword(e,p).catch(()=>{err.textContent="Correo o contraseña incorrectos";err.style.display="block";});
}
function doRegister(){
  const e=document.getElementById("l-email").value,p=document.getElementById("l-pass").value,err=document.getElementById("l-err");
  if(!e||!p){err.textContent="Ingresa correo y contraseña";err.style.display="block";return;}
  auth.createUserWithEmailAndPassword(e,p).catch(er=>{err.textContent=er.message;err.style.display="block";});
}

const uid=()=>currentUser.uid;
const eRef=(c)=>db.collection(`u/${uid()}/${c}`);
const pRef=(c,ei)=>db.collection(`u/${uid()}/${c}/${ei}/p`);
const sRef=(c,ei,pi)=>db.collection(`u/${uid()}/${c}/${ei}/p/${pi}/s`);

function go(view,cat=null,eid=null,pid=null){
  NAV={view,cat,eid,pid};
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  const k=cat||"home";
  const el=document.getElementById("n-"+k);if(el)el.classList.add("active");
  render();
}

async function render(){
  const m=document.getElementById("main");
  m.innerHTML='<div style="text-align:center;padding:40px;color:#aaa">⏳ Cargando...</div>';
  const {view,cat,eid,pid}=NAV;
  if(view==="home") await renderHome(m);
  else if(view==="cat") await renderCat(m,cat);
  else if(view==="empresa") await renderEmpresa(m,cat,eid);
  else if(view==="person") await renderPerson(m,cat,eid,pid);
}

async function getAllSess(cat){
  const all=[];
  const emps=(await eRef(cat).get()).docs;
  for(const e of emps){
    const ps=(await pRef(cat,e.id).get()).docs;
    for(const p of ps){
      const ss=(await sRef(cat,e.id,p.id).orderBy("date","desc").get()).docs;
      ss.forEach(s=>all.push({...s.data(),id:s.id,en:e.data().name,pn:p.data().name,ei:e.id,pi:p.id,cat}));
    }
  }
  return all.sort((a,b)=>b.date.localeCompare(a.date));
}

function semHtml(sess){
  const c={verde:0,amarillo:0,rojo:0};
  sess.forEach(s=>c[s.semaforo]=(c[s.semaforo]||0)+1);
  return`<div class="sem-grid">${["verde","amarillo","rojo"].map(v=>{const s=si(v);const p=sess.length?Math.round((c[v]||0)/sess.length*100):0;return`<div class="sem-card" style="background:${s.bg}"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="dot" style="background:${s.dot}"></span><span style="font-size:11px;font-weight:600;color:${s.color}">${s.label}</span></div><div style="font-size:24px;font-weight:700;color:${s.color}">${c[v]||0}</div><div style="margin-top:6px;height:4px;background:rgba(0,0,0,.08);border-radius:4px"><div style="width:${p}%;height:100%;background:${s.dot};border-radius:4px"></div></div></div>`;}).join("")}</div>`;
}

function tblHtml(sess,showCat,showEmp,showPerson){
  if(!sess.length) return'<div class="empty">Sin sesiones registradas aún.</div>';
  return`<div style="overflow-x:auto"><table><thead><tr><th>Fecha</th>${showEmp?"<th>Empresa</th>":""}${showPerson?"<th>Persona</th>":""}${showCat?"<th>Categoría</th>":""}<th>Avance</th><th>Informe</th></tr></thead><tbody>${sess.slice(0,15).map(s=>`<tr><td>${s.date}</td>${showEmp?`<td style="font-weight:600">${s.en}</td>`:""}${showPerson?`<td>${s.pn}</td>`:""}${showCat?`<td>${CI[s.cat]} ${CL[s.cat]}</td>`:""}<td>${badge(s.semaforo)}</td><td>${s.report?`<button class="btn btn-green btn-sm" onclick='doPrint(${JSON.stringify(s)})'>🖨️ Ver informe</button>`:'<span style="color:#ccc;font-size:12px">Pendiente</span>'}</td></tr>`).join("")}</tbody></table></div>`;
}

async function renderHome(m){
  let all=[];
  for(const c of["consultoria","reuniones","terapia"]) all=[...all,...(await getAllSess(c))];
  const totE=await Promise.all(["consultoria","reuniones","terapia"].map(c=>eRef(c).get().then(r=>r.size)));
  const totP=await Promise.all(["consultoria","reuniones","terapia"].map(c=>eRef(c).get().then(async r=>{let n=0;for(const e of r.docs)n+=(await pRef(c,e.id).get()).size;return n;})));
  m.innerHTML=`
    <div style="margin-bottom:22px"><div style="color:var(--brand);font-size:24px;font-style:italic">Bienvenida, Mishell</div><div style="color:#999;font-size:13px;margin-top:2px">Resumen general de tu práctica profesional</div></div>
    <div class="stat-grid">
      ${[{l:"Empresas/Orgs.",v:totE.reduce((a,b)=>a+b,0),i:"📁"},{l:"Personas",v:totP.reduce((a,b)=>a+b,0),i:"👥"},{l:"Sesiones",v:all.length,i:"📋"},{l:"Informes listos",v:all.filter(s=>s.report).length,i:"✨"}].map(x=>`<div class="stat-card"><div style="font-size:22px">${x.i}</div><div style="font-size:26px;font-weight:700;color:var(--brand)">${x.v}</div><div style="font-size:11px;color:#999">${x.l}</div></div>`).join("")}
    </div>
    ${semHtml(all)}
    <div class="card"><div class="chip">Sesiones recientes</div>${tblHtml(all,true,true,true)}</div>`;
}

async function renderCat(m,cat){
  const all=await getAllSess(cat);
  const emps=(await eRef(cat).get()).docs;
  m.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h2 style="color:var(--brand);font-size:19px;margin:0">${CI[cat]} ${CL[cat]}</h2><button class="btn btn-primary" onclick="openEmpModal('${cat}')">+ Nueva carpeta</button></div>
    ${semHtml(all)}
    <div class="card" style="margin-bottom:22px"><div class="chip">Sesiones de ${CL[cat]}</div>${tblHtml(all,false,true,true)}</div>
    <div class="chip">Carpetas</div>
    <input placeholder="🔍 Buscar carpeta…" oninput="filterList(this.value,'ec')" style="margin-top:8px">
    <div id="emp-list">${emps.length===0?'<div class="empty">Sin carpetas. ¡Crea la primera!</div>':emps.map(e=>{const n=e.data().name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");return`<div class="card ec" data-n="${e.data().name.toLowerCase()}" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="go('empresa','${cat}','${e.id}')"><div><div style="font-weight:600;font-size:15px">📁 ${e.data().name}</div></div><div style="display:flex;gap:8px" onclick="event.stopPropagation()"><button class="btn btn-outline btn-sm" onclick="openEmpModal('${cat}','${e.id}','${n}')">✏️</button><button class="btn btn-danger btn-sm" onclick="delEmp('${cat}','${e.id}')">🗑️</button></div></div>`;}).join("")}</div>`;
}

async function renderEmpresa(m,cat,eid){
  const eDoc=await eRef(cat).doc(eid).get();
  const en=eDoc.data().name;
  const ps=(await pRef(cat,eid).get()).docs;
  const all=[];
  for(const p of ps){const ss=(await sRef(cat,eid,p.id).orderBy("date","desc").get()).docs;ss.forEach(s=>all.push({...s.data(),id:s.id,en,pn:p.data().name,ei:eid,pi:p.id,cat}));}
  all.sort((a,b)=>b.date.localeCompare(a.date));
  m.innerHTML=`
    <div class="breadcrumb"><button class="btn btn-outline btn-sm" onclick="go('cat','${cat}')">← Volver</button><span>${CL[cat]}</span>/ <span>📁 ${en}</span></div>
    ${semHtml(all)}
    <div class="card" style="margin-bottom:22px"><div class="chip">Sesiones de ${en}</div>${tblHtml(all,false,false,true)}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="chip" style="margin:0">Personas</div><button class="btn btn-primary btn-sm" onclick="openPersonModal('${cat}','${eid}')">+ Nueva persona</button></div>
    <input placeholder="🔍 Buscar persona…" oninput="filterList(this.value,'pc')">
    <div id="p-list">${ps.length===0?'<div class="empty">Sin personas. ¡Agrega la primera!</div>':ps.map(p=>{const n=p.data().name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");return`<div class="card pc" data-n="${p.data().name.toLowerCase()}" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="go('person','${cat}','${eid}','${p.id}')"><div><div style="font-weight:600;font-size:14px">👤 ${p.data().name}</div></div><div style="display:flex;gap:8px" onclick="event.stopPropagation()"><button class="btn btn-outline btn-sm" onclick="openPersonModal('${cat}','${eid}','${p.id}','${n}')">✏️</button><button class="btn btn-danger btn-sm" onclick="delPerson('${cat}','${eid}','${p.id}')">🗑️</button></div></div>`;}).join("")}</div>`;
}

async function renderPerson(m,cat,eid,pid){
  const eDoc=await eRef(cat).doc(eid).get();
  const pDoc=await pRef(cat,eid).doc(pid).get();
  const en=eDoc.data().name;
  const pn=pDoc.data().name;
  const ss=(await sRef(cat,eid,pid).orderBy("date","desc").get()).docs;
  m.innerHTML=`
    <div class="breadcrumb"><button class="btn btn-outline btn-sm" onclick="go('empresa','${cat}','${eid}')">← Volver</button><span>${CL[cat]}</span>/ <span>📁 ${en}</span>/ <span>👤 ${pn}</span></div>
    <button class="btn btn-primary" style="margin-bottom:18px" onclick="openSessModal('${cat}','${eid}','${pid}')">+ Nueva sesión</button>
    <div id="s-list">${ss.length===0?'<div class="empty">Sin sesiones registradas.</div>':ss.map(s=>{
      const sd=s.data();
      const printData=JSON.stringify({...sd,id:s.id,pn,en}).replace(/'/g,"&#39;");
      return`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px">📅 ${sd.date} ${badge(sd.semaforo)}</div>
            <div class="sess-notes">${sd.notes}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
              <button class="btn btn-primary btn-sm" onclick="genReport('${cat}','${eid}','${pid}','${s.id}',this)">✨ Generar informe</button>
              ${sd.report?`<button class="btn btn-green btn-sm" onclick='doPrint(${printData})'>🖨️ Ver / PDF</button>`:""}
            </div>
            ${sd.report?`<div class="sess-report">${sd.report}</div>`:""}
          </div>
          <div style="display:flex;gap:6px;margin-left:12px">
            <button class="btn btn-outline btn-sm" onclick="openSessModal('${cat}','${eid}','${pid}','${s.id}','${encodeURIComponent(sd.date)}','${encodeURIComponent(sd.notes)}','${sd.semaforo}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="delSess('${cat}','${eid}','${pid}','${s.id}')">🗑️</button>
          </div>
        </div>
      </div>`;}).join("")}</div>`;
}

function filterList(q,cls){document.querySelectorAll("."+cls).forEach(el=>{el.style.display=el.dataset.n.includes(q.toLowerCase())?"":""  ;el.style.display=el.dataset.n.includes(q.toLowerCase())?"flex":"none";});}

// EMPRESA MODAL
function openEmpModal(cat,id="",name=""){
  showModal(`<h3 style="color:var(--brand);margin-bottom:16px">${id?"Editar":"Nueva"} carpeta</h3>
    <label class="lbl">Nombre *</label><input id="m-name" value="${name}" placeholder="Ej: Nuways, Empresa ABC…">
    <div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEmp('${cat}','${id}')">Guardar</button></div>`);
}
async function saveEmp(cat,id){
  const name=document.getElementById("m-name").value.trim();if(!name)return;
  saving(true);
  if(id) await eRef(cat).doc(id).update({name});
  else await eRef(cat).add({name,createdAt:new Date()});
  saving(false);closeModal();toast(id?"Carpeta actualizada":"Carpeta creada");render();
}
async function delEmp(cat,id){
  if(!confirm("¿Eliminar esta carpeta?"))return;
  await eRef(cat).doc(id).delete();go("cat",cat);toast("Eliminado","danger");
}

// SESSION MODAL
let _sem="verde",_mr=null,_pun=0;
function selPun(n){
  _pun=n;
  [1,2,3,4,5].forEach(i=>{const el=document.getElementById("star-"+i);if(el)el.style.color=i<=n?"#B8732A":"#ddd";});
}
function openSessModal(cat,eid,pid,id="",date="",notes="",sem="verde",obs="",pun=0){
  _sem=sem;_pun=parseInt(pun)||0;
  showModal(`<h3 style="color:var(--brand);margin-bottom:16px">${id?"Editar":"Nueva"} sesión</h3>
    <label class="lbl">Fecha *</label><input id="m-date" type="date" value="${id?decodeURIComponent(date):''}">
    <label class="lbl">Notas de la sesión *</label>
    <textarea id="m-notes" placeholder="Escribe aquí todo lo trabajado en la sesión…" style="min-height:140px">${id?decodeURIComponent(notes):''}</textarea>
    <label class="lbl">Observaciones adicionales</label>
    <textarea id="m-obs" placeholder="Compromisos, recomendaciones, próximos pasos…" style="min-height:90px">${id?decodeURIComponent(obs):''}</textarea>
    <label class="lbl">Puntuación de avance (1-5)</label>
    <div style="display:flex;gap:8px;margin-bottom:16px" id="stars-wrap">
      ${[1,2,3,4,5].map(n=>`<div onclick="selPun(${n})" id="star-${n}" style="font-size:28px;cursor:pointer;color:${n<=_pun?'#B8732A':'#ddd'};transition:color .15s">★</div>`).join("")}
    </div>
    <label class="lbl">Semáforo de avance</label>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      ${["verde","amarillo","rojo"].map(v=>{const s=si(v);return`<div class="sem-opt" id="so-${v}" style="${v===sem?"background:"+s.bg+";border-color:"+s.dot:""}" onclick="selSem('${v}')"><div style="width:14px;height:14px;border-radius:50%;background:${s.dot};margin:0 auto 4px"></div><div style="font-size:12px;font-weight:600;color:${s.color}">${s.label}</div></div>`;}).join("")}
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveSess('${cat}','${eid}','${pid}','${id}')">Guardar sesión</button></div>`);
}
function selSem(v){
  _sem=v;
  ["verde","amarillo","rojo"].forEach(x=>{
    const el=document.getElementById("so-"+x);if(!el)return;
    const s=si(x);
    if(x===v){el.style.background=s.bg;el.style.borderColor=s.dot;}
    else{el.style.background="#f8f8f8";el.style.borderColor="#ddd";}
  });
}
async function toggleRec(){
  const btn=document.getElementById("rec-btn");
  if(!_mr){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const chunks=[];_mr=new MediaRecorder(stream);
      _mr.ondataavailable=e=>chunks.push(e.data);
      _mr.onstop=()=>{stream.getTracks().forEach(t=>t.stop());_mr=null;};
      _mr.start();btn.textContent="⏹️ Detener";btn.className="btn btn-danger btn-sm";
    }catch{toast("No se pudo acceder al micrófono","danger");}
  }else{_mr.stop();btn.textContent="🎙️ Grabar audio";btn.className="btn btn-outline btn-sm";}
}
async function saveSess(cat,eid,pid,id){
  const date=document.getElementById("m-date").value;
  const notes=document.getElementById("m-notes").value.trim();
  const obs=document.getElementById("m-obs").value.trim();
  if(!date||!notes)return;
  saving(true);
  if(id) await sRef(cat,eid,pid).doc(id).update({date,notes,semaforo:_sem,report:obs,puntuacion:_pun});
  else await sRef(cat,eid,pid).add({date,notes,semaforo:_sem,report:obs,puntuacion:_pun,createdAt:new Date()});
  saving(false);closeModal();toast(id?"Sesión actualizada":"Sesión registrada");render();
}
async function delSess(cat,eid,pid,id){
  if(!confirm("¿Eliminar esta sesión?"))return;
  await sRef(cat,eid,pid).doc(id).delete();toast("Eliminado","danger");render();
}

// GENERATE REPORT
async function genReport(cat,eid,pid,sid,btn){
  btn.textContent="⏳ Generando…";btn.disabled=true;
  const s=(await sRef(cat,eid,pid).doc(sid).get()).data();
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:"Eres experta en psicología clínica y organizacional. Genera un informe profesional en español. Sin asteriscos, sin almohadillas (#), sin Markdown. Usa MAYÚSCULAS para los títulos de sección y párrafos para el contenido.\n\nSecciones requeridas:\nRESUMEN EJECUTIVO DE LA SESIÓN\nPUNTOS CLAVE TRABAJADOS\nAPRENDIZAJES E INSIGHTS\nESTADO EMOCIONAL Y AVANCE OBSERVADO\nACCIONES Y COMPROMISOS ACORDADOS\nOBJETIVOS PARA LA PRÓXIMA SESIÓN\nRECOMENDACIONES PROFESIONALES\n\nNotas de la sesión:\n"+s.notes+"\n\nEstado: "+si(s.semaforo).label+"\nFecha: "+s.date+"\n\nRedacta en párrafos, tono clínico-profesional, sin símbolos especiales ni formato Markdown."}]}]})
    });
    if(!res.ok){const err=await res.text();console.error("Gemini error:",err);throw new Error(err);}
    const d=await res.json();
    const report=d.candidates?.[0]?.content?.parts?.[0]?.text||"No se pudo generar el informe.";
    await sRef(cat,eid,pid).doc(sid).update({report});
    toast("Informe generado ✨");render();
  }catch(e){console.error(e);toast("Error: "+e.message,"danger");btn.textContent="✨ Generar informe";btn.disabled=false;}
}

// PRINT

  const inf=si(s.semaforo);
  const score=s.puntuacion||0;
  const stars="★".repeat(score)+"☆".repeat(5-score);
  const dotColor=inf.dot||inf.color;
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Informe - ${s.pn||""}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Georgia,serif;background:#FDFAF5;color:#2c2c2c;line-height:1.8}
    .page{max-width:860px;margin:0 auto;padding:48px 40px}
    .header{text-align:center;margin-bottom:36px}
    .logo{color:#B8732A;font-size:38px;font-style:italic;letter-spacing:1px}
    .psico{color:#8A5218;letter-spacing:5px;font-size:11px;text-transform:uppercase;margin-top:4px}
    .divider{width:80px;height:2px;background:#B8732A;margin:14px auto}
    .meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
    .meta-box{background:#fff;border:1px solid #F0DFC0;border-radius:10px;padding:14px 16px;text-align:center}
    .meta-box label{font-size:10px;color:#8A5218;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
    .meta-box span{font-size:15px;font-weight:600;color:#2c2c2c}
    .sem-badge{display:inline-flex;align-items:center;gap:6px;background:${inf.bg};color:${inf.color};border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600}
    .sem-dot{width:10px;height:10px;border-radius:50%;background:${dotColor}}
    .score-stars{color:#B8732A;font-size:20px;letter-spacing:2px}
    .section{background:#fff;border:1px solid #F0DFC0;border-radius:12px;padding:22px 26px;margin-bottom:20px}
    .section-title{color:#B8732A;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section-title::after{content:'';flex:1;height:1px;background:#F0DFC0}
    .notes-text{font-size:14px;color:#333;white-space:pre-wrap;line-height:1.9}
    .progress-bar-bg{background:#F0DFC0;border-radius:20px;height:10px;margin-top:10px}
    .progress-bar{height:100%;border-radius:20px;background:${dotColor};width:${score*20}%}
    .progress-label{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:4px}
    .footer{margin-top:40px;text-align:center;padding-top:20px;border-top:1px solid #F0DFC0}
    .footer-logo{color:#B8732A;font-size:18px;font-style:italic}
    .footer-sub{color:#aaa;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
    @media print{body{background:#fff}.page{padding:30px}}
  </style></head><body>
  <div class="page">
    <div class="header">
      <div class="logo">Mishell Fontalvo</div>
      <div class="psico">Psicóloga</div>
      <div class="divider"></div>
      <div style="color:#8A5218;font-size:13px;margin-top:8px">Informe de Sesión</div>
    </div>

    <div class="meta-grid">
      <div class="meta-box"><label>Persona</label><span>${s.pn||""}</span></div>
      <div class="meta-box"><label>Empresa</label><span>${s.en||""}</span></div>
      <div class="meta-box"><label>Fecha</label><span>${s.date}</span></div>
      <div class="meta-box"><label>Estado</label><span><span class="sem-badge"><span class="sem-dot"></span>${inf.label}</span></span></div>
    </div>

    <div class="section">
      <div class="section-title">Avance de la sesión</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="score-stars">${stars}</div>
        <div style="font-size:13px;color:#8A5218;font-weight:600">${score}/5</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar"></div></div>
      <div class="progress-label"><span>Sin avance</span><span>Avance máximo</span></div>
    </div>

    <div class="section">
      <div class="section-title">Notas de la sesión</div>
      <div class="notes-text">${s.notes}</div>
    </div>

    ${s.report?`<div class="section"><div class="section-title">Observaciones adicionales</div><div class="notes-text">${s.report}</div></div>`:""}

    <div class="footer">
      <div class="footer-logo">Mishell Fontalvo</div>
      <div class="footer-sub">Psicóloga · Sistema de gestión de sesiones</div>
    </div>
  </div>
  </body></html>`;
  const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}

// SEARCH
async function doSearch(q){
  const drop=document.getElementById("s-drop");
  if(q.trim().length<2){drop.classList.remove("show");return;}
  const items=[];
  for(const cat of["consultoria","reuniones","terapia"]){
    const emps=(await eRef(cat).get()).docs;
    for(const e of emps){
      if(e.data().name.toLowerCase().includes(q.toLowerCase())) items.push({type:"e",cat,eid:e.id,label:e.data().name,sub:CL[cat]});
      const ps=(await pRef(cat,e.id).get()).docs;
      for(const p of ps) if(p.data().name.toLowerCase().includes(q.toLowerCase())) items.push({type:"p",cat,eid:e.id,pid:p.id,label:p.data().name,sub:e.data().name+" · "+CL[cat]});
    }
  }
  if(!items.length){drop.classList.remove("show");return;}
  drop.innerHTML=items.map((r,i)=>`<div class="sr-item" onclick="selSearch(${i})"><div style="font-weight:600">${r.type==="e"?"📁":"👤"} ${r.label}</div><div style="font-size:11px;color:#999">${r.sub}</div></div>`).join("");
  window._si=items;drop.classList.add("show");
}
function selSearch(i){
  const r=window._si[i];
  document.getElementById("g-search").value="";
  document.getElementById("s-drop").classList.remove("show");
  if(r.type==="e") go("empresa",r.cat,r.eid);
  else go("person",r.cat,r.eid,r.pid);
}
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap")) document.getElementById("s-drop").classList.remove("show");});
</script>
</body>
</html>
